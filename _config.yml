# Portfolio Personal - Financial Engineer
title: "Juan Quintero - Financial Engineer - Data Business Analyst"
author: "Juan Quintero"
email: "juancho001046@gmail.com"
description: "Financial Engineer especializado en Data Business Analytics, Financial Analytics e IA Solutions para negocios"
baseurl: ""
url: "https://Juancho-00.github.io"
linkedin_username: "juan-quintero-354a09289"
github_username: "Juancho-00"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Navigation
navigation:
  - title: "Home"
    url: "/"
  - title: "Sobre mí"
    url: "/about"
  - title: "Proyectos"
    url: "/projects"
  - title: "Contacto"
    url: "/contact"

# Collections
collections:
  posts:
    output: true
    permalink: /:categories/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Tu Nombre"
  - scope:
      path: ""
    values:
      layout: "default"

# Analytics (opcional)
google_analytics: "UA-XXXXXXXXX-X"

# SEO
lang: "es-ES"
twitter:
  username: "tu-usuario-twitter"
  card: summary_large_image

# Color scheme
color_scheme: "dark"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
